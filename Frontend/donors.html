<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donors — Blood Bank</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="page-header">
      <div class="page-header-left"><h2>Donors</h2><p>Manage all registered blood donors</p></div>
    </div>
    <div class="card">
      <h3 id="formTitle">Add New Donor</h3>
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="form-group"><label>Full Name *</label><input type="text" id="name" placeholder="e.g. Ali Khan"></div>
        <div class="form-group"><label>Blood Group *</label>
          <select id="blood_group"><option value="">Select</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
        </div>
        <div class="form-group"><label>Date of Birth</label><input type="date" id="date_of_birth"></div>
        <div class="form-group"><label>Gender</label>
          <select id="gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select>
        </div>
        <div class="form-group"><label>Phone</label><input type="text" id="phone" placeholder="03001234567"></div>
        <div class="form-group"><label>Health Status</label>
          <select id="health_status"><option value="">Select</option><option>Healthy</option><option>Deferred</option><option>Ineligible</option></select>
        </div>
        <div class="form-group" style="grid-column:1/-1"><label>Address</label><input type="text" id="address" placeholder="Full address"></div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="saveDonor()">💾 Save Donor</button>
        <button class="btn btn-secondary" onclick="clearForm()">✕ Clear</button>
      </div>
    </div>
    <div class="card">
      <h3>All Donors</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Blood Group</th><th>Gender</th><th>Phone</th><th>Health</th><th>Last Donation</th><th>Actions</th></tr></thead>
          <tbody id="donorTable"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/sidebar.js"></script>
<script>
  renderSidebar('donors.html');
  const API = 'http://localhost:3000/api/donors';
  async function loadDonors() {
    const tbody = document.getElementById('donorTable');
    try {
      const data = await fetch(API).then(r=>r.json());
      if(!data.length){tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">👤</div><h4>No donors yet</h4><p>Add your first donor above</p></div></td></tr>';return;}
      tbody.innerHTML = data.map(d=>`<tr>
        <td><span class="badge badge-gray">#${d.donor_id}</span></td>
        <td><strong>${d.name}</strong></td>
        <td><span class="badge badge-red">${d.blood_group}</span></td>
        <td>${d.gender||'—'}</td>
        <td>${d.phone||'—'}</td>
        <td><span class="badge ${d.health_status==='Healthy'?'badge-green':'badge-orange'}">${d.health_status||'—'}</span></td>
        <td>${d.last_donation_date?d.last_donation_date.split('T')[0]:'Never'}</td>
        <td><div class="actions">
          <button class="btn btn-secondary btn-sm" onclick="editDonor(${d.donor_id})">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteDonor(${d.donor_id})">🗑️</button>
        </div></td>
      </tr>`).join('');
    } catch(e){tbody.innerHTML='<tr><td colspan="8" class="empty">Error loading donors.</td></tr>';}
  }
  async function saveDonor() {
    const id = document.getElementById('editId').value;
    const body = {
      name:document.getElementById('name').value,
      blood_group:document.getElementById('blood_group').value,
      date_of_birth:document.getElementById('date_of_birth').value,
      gender:document.getElementById('gender').value,
      phone:document.getElementById('phone').value,
      address:document.getElementById('address').value,
      health_status:document.getElementById('health_status').value,
    };
    if(!body.name||!body.blood_group){showToast('Name and Blood Group are required!','error');return;}
    const method=id?'PUT':'POST', url=id?`${API}/${id}`:API;
    const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    showToast(data.message||'Saved!');
    clearForm(); loadDonors();
  }
  async function editDonor(id) {
    const d=await fetch(`${API}/${id}`).then(r=>r.json());
    document.getElementById('editId').value=d.donor_id;
    document.getElementById('name').value=d.name;
    document.getElementById('blood_group').value=d.blood_group;
    document.getElementById('date_of_birth').value=d.date_of_birth?.split('T')[0]||'';
    document.getElementById('gender').value=d.gender||'';
    document.getElementById('phone').value=d.phone||'';
    document.getElementById('address').value=d.address||'';
    document.getElementById('health_status').value=d.health_status||'';
    document.getElementById('formTitle').textContent='✏️ Edit Donor';
    window.scrollTo({top:0,behavior:'smooth'});
  }
  async function deleteDonor(id) {
    if(!confirm('Delete this donor?'))return;
    const res=await fetch(`${API}/${id}`,{method:'DELETE'});
    const data=await res.json();
    showToast(data.message||'Deleted!'); loadDonors();
  }
  function clearForm() {
    ['editId','name','date_of_birth','phone','address'].forEach(id=>document.getElementById(id).value='');
    ['blood_group','gender','health_status'].forEach(id=>document.getElementById(id).selectedIndex=0);
    document.getElementById('formTitle').textContent='Add New Donor';
  }
  loadDonors();
</script>
</body>
</html>
