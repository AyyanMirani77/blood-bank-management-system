<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Bank — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <!-- Left Panel -->
    <div class="login-left">
      <div class="login-brand">
        <div class="drop">🩸</div>
        <h1>Blood Bank</h1>
        <p>Management System</p>
        <div class="login-stats">
          <div class="login-stat"><div class="num">8</div><div class="lbl">Modules</div></div>
          <div class="login-stat"><div class="num">24/7</div><div class="lbl">Available</div></div>
          <div class="login-stat"><div class="num">100%</div><div class="lbl">Secure</div></div>
        </div>
      </div>
    </div>
    <!-- Right Panel -->
    <div class="login-right">
      <div class="login-box">
        <div class="welcome">Welcome Back</div>
        <h2>Admin Login</h2>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="admin@blood.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="login()">Login to Dashboard</button>
        <p class="err" id="errMsg"></p>
      </div>
    </div>
  </div>
  <script>
    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errMsg   = document.getElementById('errMsg');
      errMsg.textContent = '';
      if (!email || !password) { errMsg.textContent = 'Please fill in both fields.'; return; }
      try {
        const res  = await fetch('http://localhost:3000/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('adminName', data.name);
          localStorage.setItem('adminId', data.admin_id);
          window.location.href = 'dashboard.html';
        } else { errMsg.textContent = data.error || 'Login failed.'; }
      } catch(e) { errMsg.textContent = 'Cannot connect to server. Is backend running?'; }
    }
    document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
  </script>
</body>
</html>
